name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q
